server {
    listen 80;
    server_name drluizjr.sevenxperts.solutions www.drluizjr.sevenxperts.solutions;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão (não comprime vídeo/imagem, que já são comprimidos)
    gzip on;
    gzip_types text/css application/javascript text/html image/svg+xml;
    gzip_min_length 256;

    # Página principal
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vídeo: aceita range requests (seek/streaming) e cache longo
    location ~* \.(mp4|webm)$ {
        add_header Cache-Control "public, max-age=2592000";
        add_header Accept-Ranges bytes;
    }

    # Imagens/fontes: cache longo
    location ~* \.(png|jpg|jpeg|webp|svg|woff2?)$ {
        add_header Cache-Control "public, max-age=2592000";
    }

    # HTML: sem cache (sempre fresco)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Vídeo: streaming sem cache agressivo
    location ~* profluiz-video\.mp4$ {
        add_header Cache-Control "max-age=300, must-revalidate";
        add_header Accept-Ranges bytes;
    }
}
