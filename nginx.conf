server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Tipos MIME explícitos para vídeo
    types {
        text/html html htm;
        text/css css;
        application/javascript js;
        image/png png;
        image/jpeg jpg jpeg;
        video/mp4 mp4;
    }
    default_type application/octet-stream;

    # Compressão
    gzip on;
    gzip_types text/css application/javascript text/html;
    gzip_min_length 256;

    # Página principal com fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # HTML: sempre fresco (sem cache)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0, private";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header Content-Type "text/html; charset=utf-8";
    }

    # Vídeo MP4: cache curto (5 minutos) para atualizações rápidas
    location ~* \.mp4$ {
        add_header Cache-Control "public, max-age=300, must-revalidate";
        add_header Accept-Ranges bytes;
        add_header Content-Type "video/mp4";
    }

    # Imagens: cache longo
    location ~* \.(png|jpg|jpeg)$ {
        add_header Cache-Control "public, max-age=2592000";
    }
}
